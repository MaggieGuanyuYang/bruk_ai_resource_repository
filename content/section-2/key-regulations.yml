# section-2/key-regulations.html — Topic 5.

title: "Key Regulations | BR-UK AI"
description: "Copyright (CDPA 1988), UK GDPR, international/UK AI regulations, and university-level guidance for researchers."

breadcrumb:
  - { ref: "home",      label: "Home" }

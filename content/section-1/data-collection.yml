# section-1/data-collection.html — Stage 3.

title: "Data Collection &amp; Processing | BR-UK AI"
description: "AI tools for data collection and processing: chatbots (Qualtrics, Rasa), transcription (Vink, Otter), Julius AI, synthetic data generation."

breadcrumb:
  - { ref: "home",      label: "Home" }
  - { ref: "section-1", label: "Section 1: Living Guide" }

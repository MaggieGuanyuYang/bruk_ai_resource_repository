# section-4.html — BR-UK AI Advice Sessions.

title: "Section 4: BR-UK AI Advice Sessions | BR-UK"
description: "Catch up on BR-UK's three online AI advice sessions for behavioural researchers — with Janna Hastings, Susan Michie, Amy Rodger, Maggie Guanyu Yang, and Robert West."

breadcrumb:
  - { ref: "home", label: "Home" }

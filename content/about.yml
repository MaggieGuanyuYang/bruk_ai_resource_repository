# about.html — BR-UK Statement landing page.
# Section: top-level. Acts as a teaser for the forthcoming 2026 statement.

title: "BR-UK Statement | Using AI for Behavioural Research Effectively and Responsibly"
description: "BR-UK is developing a living statement on using AI for behavioural research effectively and responsibly, to be released in 2026."

breadcrumb:
  - { ref: "home", label: "Home" }
  - { label: "BR-UK Statement" }

badge: "Living document · Coming 2026"
heading: "BR-UK Statement"

# This page renders an extra subtitle <h2> directly under the H1 (only used here).
h2_alt:
  text: "Using AI for Behavioural Research Effectively and Responsibly <em>(Coming Soon)</em>"

body:
  - prose:
      - lede:
          font_size: "1.1rem"
          text: |
            BR-UK is developing a living statement addressing ethical standards, practical
            benefits and limitations, and recommendations for people doing, using, funding,
            or commissioning behavioural research. This living document, informed by
            AI-assisted evidence review, expert consultation and community engagement, will
            be released in **2026**.
      - h2: "Stay informed"
      - markdown: |
          We'll announce the statement when it's live. To hear about it first:

          - [Join the BR-UK mailing list](https://usher.ed.ac.uk/behavioural-research-uk/join-our-mailing-list)
          - [Tell us what you want the statement to cover](https://edinburgh.eu.qualtrics.com/jfe/form/SV_3Q51tiL8OymwC58) via the suggestion form
      - h2: "About BR-UK"
      - markdown: |
          The Behavioural Research UK Leadership Hub is supported by the Economic and Social Research Council [Grant Number ES/Y001044/1], comprising partner institutions and government bodies across the UK.

          Our contributing institutions include Cardiff University, the University of Edinburgh, the University of Oxford, Queen's University Belfast, the University of Sheffield, the University of St Andrews, University College London — plus government partners across the UK nations.
      - h2: "External behavioural-AI resources"
      - markdown: |
          While you wait for our statement, here are a few current, high-quality resources on AI in behavioural research:

          - The [Behavioural AI Institute Open Letter](https://behavioralai-institute.org/open-letter)
          - [AI Evaluation Preprint](https://arxiv.org/pdf/2505.18893)
          - [Queen's University Library Guide](https://guides.library.queensu.ca/ai/rp)
          - [LSE AI Research Guidance](https://www.lse.ac.uk/DSI/AI/AI-Research)
          - [Caltech Science Exchange](https://scienceexchange.caltech.edu/topics/artificial-intelligence-research)

